# Lychee link checker configuration

# Exclude local and internal links
exclude = [
    "http://localhost",
    "http://127.0.0.1",
    "https://github.com/Orderly-Team24/team-24/actions",
]

# Maximum number of retries for failed requests
max_retries = 3

# Wait time between retries in seconds
retry_wait = 30

# Skip checking email addresses
skip_mail = true
