<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orderly - Food Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Orderly</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/food-recommender/">Menu</a>
                <a href="/photo_from_gallery/">Upload</a>
                <a href="#">Profile</a>
            </nav>
        </div>
    </header>


    <main class="container">
        <section id="recommendations-section">
            <h2>🔥 Recommendations for you</h2>
            <p class="subtitle">Personal recommendations based on your preferences</p>

            <div class="user-input">
                <label for="user-message">What are you in the mood for?</label>
                <input
                    type="text"
                    id="user-message"
                    placeholder="e.g. something light and vegetarian under $15"
                    autocomplete="off"
                >
                <button id="get-recs-btn" type="button">Get recommendations</button>
            </div>

            <div id="loading-spinner" class="spinner-container">
                <div class="spinner"></div>
                <p>Loading recommendations...</p>
            </div>

            <div id="recommendations-container" style="display: none;">
                <div id="dishes-grid"></div>
            </div>


            <div id="error-message" class="message error" style="display: none;">
                ⚠️ <span id="error-message-text">Failed to load recommendations. Please try again later.</span>
            </div>

            <div id="no-recommendations" class="message info" style="display: none;">
                No recommendations yet. Fill out your profile or upload a menu.
            </div>
        </section>
    </main>


    <footer>
        <div class="container">
            <p>© 2026 Orderly.</p>
        </div>
    </footer>

    <script src="/config.js"></script>
    <script src="script.js"></script>
</body>
</html>
