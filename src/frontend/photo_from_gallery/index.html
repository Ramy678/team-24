<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Menu Photo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Orderly</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Menu</a>
                <a href="#">Profile</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="upload-section">
            <h2>📸 Upload Menu Photo</h2>
            <p class="subtitle">Select a photo of the menu from your gallery to upload for processing</p>

            <div class="upload-box">
                <input type="file" id="menu-photo-input" accept="image/jpeg,image/png">
                <button id="upload-btn">Choose Photo</button>
                <p class="hint">Supported formats: JPEG, PNG • Max size: 8 MB</p>

                <div id="photo-preview">
                    <img id="preview-image" src="#" alt="Menu preview">
                    <p id="file-info"></p>
                    <div class="actions">
                        <button id="upload-submit-btn">Send for processing</button>
                        <button id="remove-photo-btn">Remove</button>
                    </div>
                </div>

                <div id="upload-error" class="message error"></div>
                <div id="upload-success" class="message info"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Orderly. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
